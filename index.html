<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quorum</title>
    <meta name="description" content="Team standup app — before, during, and after." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'DM Sans', sans-serif; background: #fafafa; }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      .hero-tag { animation: fadeUp 0.5s ease 0.1s both; }
      .hero-h1 { animation: fadeUp 0.6s ease 0.2s both; }
      .hero-p { animation: fadeUp 0.6s ease 0.3s both; }
      .hero-cta { animation: fadeUp 0.6s ease 0.4s both; }
      .hero-sub { animation: fadeUp 0.6s ease 0.5s both; }
      .feature-card { transition: all 0.2s ease; }
      .feature-card:hover { border-color: #ffccd2 !important; transform: translateY(-3px); box-shadow: 0 12px 32px rgba(230,0,35,0.09) !important; }
      .faq-item summary { list-style: none; cursor: pointer; }
      .faq-item summary::-webkit-details-marker { display: none; }
      .faq-item[open] summary { color: #e60023; }
      .step-num { background: linear-gradient(135deg, #e60023, #ff4d6d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
      .quorum-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }
      .quorum-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 40px; }
      .quorum-nav-inner { max-width: 1200px; margin: 0 auto; height: 64px; display: flex; align-items: center; justify-content: space-between; }
      .quorum-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
      .quorum-actions { display: flex; gap: 10px; }
      @media (max-width: 768px) {
        .quorum-grid { grid-template-columns: 1fr; }
        .quorum-wrap { padding: 20px 16px; }
        .quorum-header { flex-direction: column; align-items: flex-start; gap: 12px; }
        .quorum-actions { width: 100%; }
        .quorum-actions button { flex: 1; justify-content: center; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
